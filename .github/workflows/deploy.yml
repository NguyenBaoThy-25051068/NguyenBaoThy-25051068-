name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Detect GitHub Pages base path
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_LOWER="$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')"
          REPO_LOWER="$(echo "$REPO_NAME" | tr '[:upper:]' '[:lower:]')"
          if [ "$REPO_LOWER" = "$OWNER_LOWER.github.io" ]; then
            echo "BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "BASE_PATH=/$REPO_NAME/" >> "$GITHUB_ENV"
          fi

      - name: Build (static)
        env:
          STATIC_BUILD: "1"
        run: bun run build

      - name: Prepare output
        run: |
          OUT_DIR="dist/client"
          if [ ! -d "$OUT_DIR" ]; then
            echo "Build output directory $OUT_DIR not found"; ls -la dist || true; exit 1
          fi
          if [ ! -f "$OUT_DIR/index.html" ]; then
            echo "index.html not found in $OUT_DIR"; find "$OUT_DIR" -maxdepth 2 -type f | sort; exit 1
          fi
          test -s "$OUT_DIR/index.html" || { echo "index.html is empty"; exit 1; }
          # SPA fallback for GitHub Pages deep-linking
          cp "$OUT_DIR/index.html" "$OUT_DIR/404.html"
          touch "$OUT_DIR/.nojekyll"
          echo "OUT_DIR=$OUT_DIR" >> $GITHUB_ENV


      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
